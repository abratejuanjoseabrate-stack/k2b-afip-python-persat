# Servicio AFIP - Docker Compose (Producción)
# Ejecutar desde el directorio donde está este archivo (ej: /opt/afip o servicioAfip/)
version: '3.8'

services:
  afip-api:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: afip-service
    restart: unless-stopped
    
    # Variables de entorno
    environment:
      # CUIT del emisor (obligatorio)
      - CUIT=${AFIP_CUIT}
      
      # Punto de venta default
      - PTO_VTA=${AFIP_PTO_VTA:-1}
      
      # Base de datos SQLite (ruta en volumen persistente)
      - DATABASE_URL=sqlite+aiosqlite:///./data/database.db
      
      # JWT Secret (cambiar en producción!)
      - SECRET_KEY=${JWT_SECRET_KEY}
      
      # Certificados homologación
      - CERT_PATH=${CERT_PATH:-certs/homo/LIROpriv20260226homo3_CRT.crt}
      - KEY_PATH=${KEY_PATH:-certs/homo/LIROpriv20260226homo3.key}
      
      # Certificados producción
      - PROD_CERT_PATH=${PROD_CERT_PATH:-certs/prod/LIROPRUEBASFACT20260919PROD2_4d6fbf9ef97dc5b6.crt}
      - PROD_KEY_PATH=${PROD_KEY_PATH:-certs/prod/LIROpriv20260219prod2.key}
      
      # Configuración API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      
      # Nivel de logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=logs/app.log
      # Producción: sin reload (evita watcher y es más estable)
      - API_RELOAD=false
      
      # URLs AFIP (homologación por defecto)
      - URL_WSAA=${URL_WSAA:-https://wsaahomo.afip.gov.ar/ws/services/LoginCms?wsdl}
      - URL_WSFEV1=${URL_WSFEV1:-https://wswhomo.afip.gov.ar/wsfev1/service.asmx?WSDL}
      - URL_PADRON_A5_HOMO=${URL_PADRON_A5_HOMO:-https://awshomo.afip.gov.ar/sr-padron/webservices/personaServiceA5?WSDL}
      - URL_PADRON_A5_PROD=${URL_PADRON_A5_PROD:-https://aws.afip.gov.ar/sr-padron/webservices/personaServiceA5?WSDL}
    
    # Puertos: solo localhost para que solo TomEE/Java se conecte (seguridad)
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    
    # Volúmenes persistentes
    volumes:
      # Certificados AFIP (solo lectura)
      - ./certs:/app/certs:ro
      
      # Cache de tickets de acceso
      - afip-cache:/app/cache
      
      # Logs
      - afip-logs:/app/logs
      
      # Base de datos SQLite
      - afip-db:/app/data
    
    # Red
    networks:
      - afip-network
    
    # Límites de recursos (opcional)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# Volúmenes persistentes
volumes:
  afip-cache:
    driver: local
  afip-logs:
    driver: local
  afip-db:
    driver: local

# Red interna
networks:
  afip-network:
    driver: bridge
